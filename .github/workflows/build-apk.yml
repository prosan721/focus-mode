name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install Node Dependencies
      run: npm install

    - name: Build Web App (Vite)
      run: npm run build

    - name: Create Android Assets directory
      run: mkdir -p android/app/src/main/assets/www

    - name: Copy Web Build to Android Assets
      run: cp -R dist/* android/app/src/main/assets/www/

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Build APK (Assemble Debug)
      working-directory: ./android
      run: gradle assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: FocusShield-Debug-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
